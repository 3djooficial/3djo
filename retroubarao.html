<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUBARÃO DO JOSIEL V12</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: 'Press Start 2P', cursive; background: #1e3c72; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; padding-top: 5vh; }
        .console { background: #C0C0C0; padding: 20px; border-radius: 20px; border: 6px solid #808080; width: 350px; box-shadow: 10px 10px 0px rgba(0,0,0,0.3); }
        .screen { background: linear-gradient(180deg, #0077be, #003366, #001133); height: 300px; border-radius: 10px; position: relative; overflow: hidden; border: 4px solid #000; display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(5, 1fr); }
        .bubble { position: absolute; background: rgba(255,255,255,0.1); border-radius: 50%; animation: rise linear infinite; }
        @keyframes rise { from { bottom: -20px; } to { bottom: 320px; } }
        .cell { border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; position: relative; }
        .entity { transition: all 0.1s linear; position: absolute; }
        
        .shark { font-size: 2.65rem; transform: scaleX(-1); z-index: 5; }
        .s-fish { font-size: 1.2rem; }
        .s-crab { font-size: 0.9rem; }
        .s-shrimp { font-size: 0.6rem; }
        .s-lobster { font-size: 1.2rem; }
        .s-full { font-size: 2.65rem; }
        .s-whale-big { font-size: 3.18rem; }
        
        /* Redução de 5% para o Polvo (de 2.12rem para 2.01rem) */
        .s-octopus-small { font-size: 2.01rem; }
        
        /* Aumento de 10% para o Dragão */
        .s-dragon-big { font-size: 2.91rem; }

        .hud { color: #000; font-size: 0.8rem; padding: 5px; text-align: center; margin-bottom: 5px; font-weight: bold; }
        .controls { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 20px; width: 350px; }
        .btn { width: 100%; height: 90px; font-size: 2rem; background: #666; border: 4px solid #444; border-radius: 10px; color: white; cursor: pointer; touch-action: manipulation; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 0 #333; }
        .btn:active { transform: translateY(5px); box-shadow: none; }
        
        .start-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 30; color: white; text-align: center; }
        .title-main { font-size: 2rem; margin-bottom: 5px; }
        .title-sub { font-size: 1rem; margin-bottom: 20px; }
        .start-shark { font-size: 5rem; margin-bottom: 20px; transform: scaleX(-1); }
        .btn-start { padding: 15px 30px; font-family: 'Press Start 2P', cursive; font-size: 1rem; background: #23d160; border: none; border-radius: 10px; cursor: pointer; color: white; }
        .game-over-screen { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(180, 30, 30, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 20; text-align: center; }
    </style>
</head>
<body>
<div class="console">
    <div class="hud" id="scoreHud">PONTOS: 0</div>
    <div class="screen" id="gameGrid">
        <div class="start-overlay" id="overlay">
            <div class="title-main">TUBARÃO</div>
            <div class="title-sub">DO JOSIEL</div>
            <div class="start-shark">🦈</div>
            <button class="btn-start">INICIAR</button>
        </div>
        <div class="game-over-screen" id="gameOverScreen">
            <h2 style="margin-bottom: 20px;">GAME OVER</h2>
            <div id="finalScoreText" style="margin-bottom: 20px;"></div>
            <button class="btn" style="width: auto; padding: 10px 20px; font-size: 1rem;" onclick="location.reload()">REINICIAR</button>
        </div>
    </div>
</div>
<div class="controls">
    <button class="btn" id="up">🔼</button>
    <button class="btn" id="down">🔽</button>
</div>
<script>
    function createBubbles() {
        const screen = document.getElementById('gameGrid');
        for(let i=0; i<10; i++) {
            const b = document.createElement('div');
            b.className = 'bubble';
            b.style.width = Math.random()*15 + 5 + 'px';
            b.style.height = b.style.width;
            b.style.left = Math.random()*100 + '%';
            b.style.animationDuration = Math.random()*3 + 3 + 's';
            screen.appendChild(b);
        }
    }
    createBubbles();
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, duration) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }
    const soundEat = () => playTone(600, 'sine', 0.1);
    const soundGameOver = () => playTone(100, 'sawtooth', 0.5);
    const grid = document.getElementById('gameGrid');
    const scoreHud = document.getElementById('scoreHud');
    const overlay = document.getElementById('overlay');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreText = document.getElementById('finalScoreText');
    let sharkRow = 2;
    let enemies = [];
    let score = 0;
    let gameActive = false;
    const CREATURES = {
        fish:    { e: '🐟', p: 4, s: 's-fish', d: false },
        crab:    { e: '🦀', p: 3, s: 's-crab', d: false },
        shrimp:  { e: '🦐', p: 1, s: 's-shrimp', d: false },
        lobster: { e: '🦞', p: 2, s: 's-lobster', d: false },
        octopus: { e: '🐙', p: 5, s: 's-octopus-small', d: false },
        whale:   { e: '🐳', p: 0, s: 's-whale-big', d: true },
        dragon:  { e: '🐲', p: 0, s: 's-dragon-big', d: true },
        rock:    { e: '🏔', p: 0, s: 's-full', d: true }
    };
    function render() {
        const cells = document.querySelectorAll('.cell');
        cells.forEach(c => c.remove());
        scoreHud.innerText = "PONTOS: " + score;
        for(let i=0; i<25; i++) {
            let cell = document.createElement('div');
            cell.className = 'cell';
            if(i === (sharkRow * 5 + 1)) cell.innerHTML = '<div class="entity shark">🦈</div>';
            enemies.forEach(en => {
                if(en.pos === i) cell.innerHTML = `<div class="entity ${CREATURES[en.type].s}">${CREATURES[en.type].e}</div>`;
            });
            grid.appendChild(cell);
        }
    }
    function moveShark(d) {
        if(!gameActive) return;
        sharkRow = Math.max(0, Math.min(4, sharkRow + d));
        render();
    }
    document.getElementById('up').addEventListener('touchstart', (e) => { e.preventDefault(); moveShark(-1); });
    document.getElementById('down').addEventListener('touchstart', (e) => { e.preventDefault(); moveShark(1); });
    overlay.addEventListener('click', () => {
        overlay.style.display = 'none';
        gameActive = true;
        gameLoop();
    });
    function gameLoop() {
        if(!gameActive) return;
        if(Math.random() < 0.4) {
            let keys = Object.keys(CREATURES);
            let type = keys[Math.floor(Math.random()*keys.length)];
            enemies.push({type, pos: Math.floor(Math.random()*5)*5 + 4});
        }
        enemies.forEach(en => {
            en.pos -= 1;
            if(en.pos === (sharkRow * 5 + 1)) {
                if(CREATURES[en.type].d) {
                    soundGameOver();
                    gameActive = false;
                    gameOverScreen.style.display = 'flex';
                    finalScoreText.innerText = "TOTAL: " + score + " PONTOS";
                } else {
                    soundEat();
                    score += CREATURES[en.type].p;
                    en.pos = -1;
                }
            }
        });
        enemies = enemies.filter(en => en.pos % 5 !== 4 && en.pos >= 0);
        render();
        if(gameActive) setTimeout(gameLoop, 700);
    }
    render();
</script>
</body>
</html>

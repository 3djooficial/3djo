<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaquinha | 3DJO</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #f7f9fc 0%, #eef2f7 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            color: #2c3e50;
            overflow: hidden;
        }
        .header {
            text-align: center;
            width: 100%;
        }
        .logo-link {
            text-decoration: none;
            font-size: 13px;
            font-weight: 700;
            color: #7f8c8d;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 340px;
            flex: 1;
        }
        .instruction-text {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: 500;
            text-align: center;
        }
        .animal-img {
            width: 220px;
            height: 220px;
            object-fit: contain;
            display: block;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
            transition: transform 0.2s ease;
            margin-bottom: 12px;
        }
        .animal-img:active {
            transform: scale(0.95);
        }
        h1 {
            font-size: 26px;
            color: #1a252f;
            font-weight: 800;
        }
        .contact-section {
            width: 100%;
            max-width: 340px;
            margin-bottom: 4px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 11px 16px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.15s ease, opacity 0.15s ease;
            margin-bottom: 8px;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-whats {
            background-color: #25d366;
            color: white;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
            font-size: 16px;
        }
        .social-row {
            display: flex;
            gap: 8px;
            width: 100%;
        }
        .btn-social {
            flex: 1;
            padding: 10px;
            font-size: 13px;
            margin-bottom: 0;
            color: white;
        }
        .btn-insta {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            box-shadow: 0 4px 12px rgba(220, 39, 67, 0.25);
        }
        .btn-face {
            background-color: #1877f2;
            box-shadow: 0 4px 12px rgba(24, 119, 242, 0.25);
        }
        .footer {
            font-size: 11px;
            color: #95a5a6;
            text-align: center;
            width: 100%;
            padding-bottom: 4px;
        }
        .footer a {
            color: #7f8c8d;
            text-decoration: none;
            font-weight: 600;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="https://3djo.com.br" class="logo-link">3DJO</a>
    </div>

    <div class="main-content">
        <p class="instruction-text">Toque em mim para ouvir o meu som!</p>
        <img src="vaca.png" alt="Desenho da Vaquinha" class="animal-img" onclick="tocarSom()">
        <h1>Vaquinha</h1>
    </div>

    <div class="contact-section">
        <a href="https://wa.me/5585996925348" class="btn btn-whats" target="_blank" rel="noopener noreferrer">
            <span>💬</span> WhatsApp
        </a>

        <div class="social-row">
            <a href="https://www.instagram.com/3djo.oficial?igsh=cXppZmtsYmUzem4x" class="btn btn-social btn-insta" target="_blank" rel="noopener noreferrer">
                Instagram
            </a>
            <a href="https://www.facebook.com/share/1Bjak99DEv/" class="btn btn-social btn-face" target="_blank" rel="noopener noreferrer">
                Facebook
            </a>
        </div>
    </div>

    <div class="footer">
        © <span id="anoAtual"></span> <a href="https://3djo.com.br" target="_blank">3DJO</a> - Todos os direitos reservados.
    </div>

    <audio id="somVaca" src="vaca.mp3"></audio>

    <script>
        document.getElementById('anoAtual').textContent = new Date().getFullYear();

        function tocarSom() {
            const audio = document.getElementById('somVaca');
            audio.currentTime = 0; 
            audio.play().catch(error => {
                console.log("Reprodução impedida pelo navegador:", error);
            });
        }
    </script>

</body>
</html>
